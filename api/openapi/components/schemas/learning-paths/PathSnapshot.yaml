type: object
additionalProperties: false
description: >
  A revision's curriculum graph: every node (included or skipped) and both edge
  layers behind the show-skipped toggle. Shared by the public path page
  (/paths/{slug}) and the revision editor (/path-revisions/{id}); each wraps it
  alongside its own identity object.
properties:
  nodes:
    type: array
    items:
      $ref: "../learning-path-revisions/PathNode.yaml"
  projected_edges:
    description: >
      Hide-skipped view: the prerequisite edges among included nodes only,
      bridged across skipped ones, frozen at publish.
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        from_id:
          $ref: "../common/Uuid.yaml"
        to_id:
          $ref: "../common/Uuid.yaml"
      required: [from_id, to_id]
  raw_edges:
    description: >
      Show-skipped view: the prerequisite edges among all of this revision's
      nodes, read live from the guide graph with no bridging over skipped nodes.
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        from_id:
          $ref: "../common/Uuid.yaml"
        to_id:
          $ref: "../common/Uuid.yaml"
      required: [from_id, to_id]
required: [nodes, projected_edges, raw_edges]
