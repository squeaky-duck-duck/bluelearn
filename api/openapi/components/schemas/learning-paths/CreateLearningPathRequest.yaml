type: object
additionalProperties: false
description: >
  Creates a draft path (shell + revision 1), seeding the closure of the
  target guides as the initial node set.
properties:
  title:
    description: Optional at creation; a title is only required to publish.
    type: string
    example: Backend Engineer
  summary:
    type: [string, "null"]
  target_ids:
    type: array
    description: Guide base ids the path is built to reach.
    items:
      $ref: "../common/Uuid.yaml"
required: [target_ids]
