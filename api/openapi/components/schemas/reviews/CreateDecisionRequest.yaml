description: >
  Cast a panel vote. An approve carries optional notes; a reject must carry
  notes plus at least one rubric reason.
oneOf:
  - title: Approve
    type: object
    additionalProperties: false
    properties:
      decision:
        type: string
        const: approved
      notes:
        type: string
        example: All the information is correct.
    required: [decision]
  - title: Reject
    type: object
    additionalProperties: false
    properties:
      decision:
        type: string
        const: rejected
      notes:
        type: string
        example: Missing prerequisites
      reasons:
        type: array
        minItems: 1
        items:
          $ref: "./ReviewDecisionReason.yaml"
    required: [decision, notes, reasons]
