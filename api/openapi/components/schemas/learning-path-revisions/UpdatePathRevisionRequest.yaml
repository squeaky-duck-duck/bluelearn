type: object
additionalProperties: false
description: Overwrite a draft revision's metadata (draft only; published is immutable). Partial.
minProperties: 1
properties:
  title:
    type: string
    example: Backend Engineer
  summary:
    type: [string, "null"]
    example: Updated summary
  change_summary:
    description: The curator's note describing what changed in this revision.
    type: [string, "null"]
    example: Added a statistics branch before ML.
