type: object
additionalProperties: false
description: >
  A revision's editorial metadata paired with its curriculum graph. The same
  wrapper the public path page uses ({ path, snapshot }), keyed on the revision
  instead of the path so the editor sees the specific revision it is editing.
properties:
  revision:
    $ref: "./LearningPathRevision.yaml"
  snapshot:
    $ref: "../learning-paths/PathSnapshot.yaml"
required: [revision, snapshot]
