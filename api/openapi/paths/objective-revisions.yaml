# Path items for /objective-revisions. Referenced from ../openapi.yaml.
/objective-revisions/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
  get:
    tags: [objective-revisions]
    summary: Get a revision snapshot
    description: >
      Metadata, the revision's nodes, and both edge sets behind the editor's
      show-skipped / hide-skipped toggle: the bridged projection over included
      nodes and the raw prerequisite edges among all nodes.
    operationId: getObjectiveRevision
    responses:
      "200":
        description: The revision snapshot
        content:
          application/json:
            schema:
              $ref: "../components/schemas/objective-revisions/ObjectiveRevisionSnapshot.yaml"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"
  patch:
    tags: [objective-revisions]
    summary: Overwrite a draft revision's metadata
    description: Draft only; a published revision is immutable.
    operationId: updateObjectiveRevision
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/objective-revisions/UpdateObjectiveRevisionRequest.yaml"
    responses:
      "200":
        description: The updated revision
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                revision:
                  $ref: "../components/schemas/objective-revisions/ObjectiveRevision.yaml"
                subjects:
                  type: array
                  items:
                    $ref: "../components/schemas/subjects/SubjectTag.yaml"
              required: [revision, subjects]
      "400":
        $ref: "../components/responses/_shared.yaml#/BadRequest"
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/objective-revisions/{id}/targets:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
  post:
    tags: [objective-revisions]
    summary: Add a target
    description: >
      Flags a guide base as one of the objective's goals and walks its prerequisite
      closure. Topics not yet in the revision are inserted as included nodes
      pinned to their canonical variant. Topics already present are left as-is:
      their pinned variant, note, and included/skipped state are preserved, so a
      deliberately skipped prerequisite stays skipped and is bridged over rather
      than resurrected. The added base itself is always flagged as a target and
      forced included, since a goal cannot be skipped from its own curriculum.
      Draft only. Returns the recomputed snapshot.
    operationId: addObjectiveTarget
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              guide_base_id:
                description: The guide base to add as a target.
                $ref: "../components/schemas/common/Uuid.yaml"
            required: [guide_base_id]
    responses:
      "200":
        description: The recomputed snapshot
        content:
          application/json:
            schema:
              $ref: "../components/schemas/objective-revisions/ObjectiveRevisionSnapshot.yaml"
      "400":
        $ref: "../components/responses/_shared.yaml#/BadRequest"
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/objective-revisions/{id}/targets/{baseId}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
    - name: baseId
      in: path
      required: true
      description: The target's guide_base_id.
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
  delete:
    tags: [objective-revisions]
    summary: Remove a target
    description: >
      Clears the target flag on a node, then prunes (deletes the rows of) every
      topic that is no longer in any surviving target's closure. A topic still
      reached by another target is kept. Pruning deletes the node rather than
      skipping it: a skipped topic stays in the revision with is_included false,
      a pruned topic leaves it entirely. Draft only. Returns the recomputed snapshot.
    operationId: removeObjectiveTarget
    security:
      - bearerAuth: []
    responses:
      "200":
        description: The recomputed snapshot
        content:
          application/json:
            schema:
              $ref: "../components/schemas/objective-revisions/ObjectiveRevisionSnapshot.yaml"
      "400":
        $ref: "../components/responses/_shared.yaml#/BadRequest"
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/objective-revisions/{id}/nodes/{baseId}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
    - name: baseId
      in: path
      required: true
      description: The node's guide_base_id.
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
  patch:
    tags: [objective-revisions]
    summary: Update a node
    description: >
      Swap the chosen variant, set a note, toggle is_target, or skip /
      re-include the node (is_included). Skipping is a soft hide, not a delete.
    operationId: updateObjectiveNode
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/objective-revisions/UpdateNodeRequest.yaml"
    responses:
      "200":
        description: The updated node
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                node:
                  $ref: "../components/schemas/objective-revisions/ObjectiveNode.yaml"
              required: [node]
      "400":
        $ref: "../components/responses/_shared.yaml#/BadRequest"
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/objective-revisions/{id}/publish:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
  post:
    tags: [objective-revisions]
    summary: Publish the revision
    description: Publishes the draft directly (no review gate); freezes its edges and points the objective at it.
    operationId: publishObjectiveRevision
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Published
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                slug:
                  type: string
              required: [slug]
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/objective-revisions/{id}/rollback:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
  post:
    tags: [objective-revisions]
    summary: Roll back to an older revision
    description: Clones an older revision's targets/nodes into a new draft.
    operationId: rollbackObjectiveRevision
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              revision_id:
                $ref: "../components/schemas/common/Uuid.yaml"
            required: [revision_id]
    responses:
      "201":
        description: Created; new draft revision id
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                revision_id:
                  $ref: "../components/schemas/common/Uuid.yaml"
              required: [revision_id]
      "400":
        $ref: "../components/responses/_shared.yaml#/BadRequest"
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "403":
        $ref: "../components/responses/_shared.yaml#/Forbidden"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/objective-revisions/{id}/diff/{otherId}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
    - name: otherId
      in: path
      required: true
      schema:
        $ref: "../components/schemas/common/Uuid.yaml"
  get:
    tags: [objective-revisions]
    summary: Rendered diff between two revision snapshots
    operationId: diffObjectiveRevisions
    responses:
      "200":
        description: The rendered diff
        content:
          application/json:
            schema:
              $ref: "../components/schemas/objective-revisions/ObjectiveRevisionDiff.yaml"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"
