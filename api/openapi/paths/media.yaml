# Path items for /media. Referenced from ../openapi.yaml.
/media/upload:
  post:
    tags: [media]
    summary: Upload a file to object storage
    operationId: uploadMedia
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            additionalProperties: false
            properties:
              file:
                type: string
                format: binary
              revision_id:
                type: string
                format: uuid
                description: The draft revision the asset is linked to.
            required: [file, revision_id]
    responses:
      "201":
        description: The stored asset
        content:
          application/json:
            schema:
              $ref: "../components/schemas/media/MediaUploadResponse.yaml"
      "400":
        $ref: "../components/responses/_shared.yaml#/BadRequest"
      "401":
        $ref: "../components/responses/_shared.yaml#/Unauthorized"
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"
